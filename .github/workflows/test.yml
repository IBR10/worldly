name: tests

on:
  push:
    branches: [main]
  pull_request:

# A superseded push or PR update does not need its old run carried to completion.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Run engine tests
        run: npm run test:ci

      # Covers main.js -- routing, every screen, the quiz session -- which the
      # engine tests do not touch, plus the markup/perf budgets.
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser tests
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
