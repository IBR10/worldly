<!DOCTYPE html>
<!-- data-theme here is only the pre-JS default, so the first paint is styled
     rather than unstyled. main.js replaces it during boot with the stored
     preference, or the OS preference when the player has not chosen one. -->
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Worldly — a free world-knowledge & cultural-awareness learning game. Capitals, languages, religions, flags, maps, music, phrases and current events, with spaced repetition and achievements." />
  <!-- Matches --bg in css/styles.css; these had drifted apart, showing a seam
       between the browser chrome and the page on installed PWAs. -->
  <meta name="theme-color" content="#0f1525" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#eef2fb" media="(prefers-color-scheme: light)" />
  <title>Worldly — World Knowledge & Culture</title>

  <!-- Social sharing (og:url/og:image are absolute: update the domain after deploy). -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Worldly" />
  <meta property="og:title" content="Worldly — World Knowledge & Culture" />
  <meta property="og:description" content="Learn the world through active recall: capitals, flags, maps, religions, languages, music and current events — with spaced repetition." />
  <meta property="og:url" content="https://playworldly.pages.dev/" />
  <meta property="og:image" content="https://playworldly.pages.dev/assets/screenshot-home.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://playworldly.pages.dev/" />

  <!-- Flags come from flagcdn on nearly every screen; open the connection
       during head parsing rather than at first <img>. countries.json is needed
       before anything can render, and is otherwise only requested once
       main.js -> data.js has loaded. No crossorigin: the real request is
       same-origin and non-CORS, and mismatching it would fetch twice. -->
  <link rel="preconnect" href="https://flagcdn.com" />
  <link rel="preload" href="data/countries.json" as="fetch" />

  <link rel="icon" href="assets/worldly.ico" sizes="any" />
  <link rel="icon" type="image/png" href="assets/worldly-icon.png" />
  <link rel="apple-touch-icon" href="assets/worldly-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#app">Skip to main content</a>
  <header class="topbar">
    <!-- A real button, rather than div[role=button] with hand-rolled key
         handling: Enter/Space, focus and AT semantics come for free. -->
    <button class="brand" id="brand" title="Home">
      <span class="brand-globe" aria-hidden="true">🌍</span><span class="brand-name">Worldly</span>
    </button>
    <div class="hud" id="hud"><!-- level / xp / streak injected here --></div>
    <button id="helpBtn" class="icon-btn" title="About & help" aria-label="About and help">❓</button>
    <button id="leaderboardBtn" class="icon-btn" title="Leaderboard" aria-label="Leaderboard">🏆</button>
    <button id="themeToggle" class="icon-btn" title="Toggle light / dark" aria-label="Toggle theme">🌙</button>
  </header>

  <main id="app" class="app"><!-- screens render here --></main>

  <div id="toasts" class="toasts" aria-live="polite"></div>

  <footer class="footer">
    <span>Worldly · learn the world through active recall
      · <a class="footer-link" href="https://github.com/IBR10/worldly/issues/new" target="_blank" rel="noopener">💬 Feedback &amp; requests</a>
      · <a class="footer-link" href="https://github.com/IBR10/worldly" target="_blank" rel="noopener">GitHub</a></span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
