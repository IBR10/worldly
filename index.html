<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Worldly — a free world-knowledge & cultural-awareness learning game. Capitals, languages, religions, flags, maps, music, phrases and current events, with spaced repetition and achievements." />
  <meta name="theme-color" content="#0f1420" />
  <title>Worldly — World Knowledge & Culture</title>

  <!-- Social sharing (og:url/og:image are absolute: update the domain after deploy). -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Worldly" />
  <meta property="og:title" content="Worldly — World Knowledge & Culture" />
  <meta property="og:description" content="Learn the world through active recall: capitals, flags, maps, religions, languages, music and current events — with spaced repetition." />
  <meta property="og:url" content="https://worldly.pages.dev/" />
  <meta property="og:image" content="https://worldly.pages.dev/assets/screenshot-home.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="canonical" href="https://worldly.pages.dev/" />

  <link rel="icon" href="assets/worldly.ico" sizes="any" />
  <link rel="icon" type="image/png" href="assets/worldly-icon.png" />
  <link rel="apple-touch-icon" href="assets/worldly-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brand" role="button" tabindex="0" title="Home">
      <span class="brand-globe">🌍</span><span class="brand-name">Worldly</span>
    </div>
    <div class="hud" id="hud"><!-- level / xp / streak injected here --></div>
    <button id="themeToggle" class="icon-btn" title="Toggle light / dark" aria-label="Toggle theme">🌙</button>
  </header>

  <main id="app" class="app"><!-- screens render here --></main>

  <div id="toasts" class="toasts" aria-live="polite"></div>

  <footer class="footer">
    <span>Worldly · learn the world through active recall</span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
