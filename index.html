<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Never let the browser show a stale build from its cache. -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="description" content="Worldly — a world-knowledge & cultural-awareness learning game. Capitals, languages, religions, flags, maps, music, phrases and current events, with spaced repetition and achievements." />
  <title>Worldly — World Knowledge & Culture</title>
  <link rel="icon" href="assets/worldly.ico" sizes="any" />
  <link rel="icon" type="image/png" href="assets/worldly-icon.png" />
  <link rel="apple-touch-icon" href="assets/worldly-icon.png" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brand" role="button" tabindex="0" title="Home">
      <span class="brand-globe">🌍</span><span class="brand-name">Worldly</span>
    </div>
    <div class="hud" id="hud"><!-- level / xp / streak injected here --></div>
    <button id="themeToggle" class="icon-btn" title="Toggle light / dark" aria-label="Toggle theme">🌙</button>
  </header>

  <main id="app" class="app"><!-- screens render here --></main>

  <div id="toasts" class="toasts" aria-live="polite"></div>

  <footer class="footer">
    <span>Worldly · learn the world through active recall</span>
  </footer>

  <script type="module" src="js/main.js"></script>
</body>
</html>
