name = "playworldly"
pages_build_output_dir = "."
compatibility_date = "2026-07-08"
compatibility_flags = ["nodejs_compat"]

# Sessions and rate-limit counters used to live in KV (SESSIONS_KV). They moved
# to D1 in migrations/0003 because KV Free allows only 1,000 writes/day and one
# write per second per key, which a single Challenge run could exhaust or trip.
# The old `worldly-sessions` KV namespace has since been deleted; the only
# stateful binding is the D1 database below.
[[d1_databases]]
binding = "DB"
database_name = "worldly-leaderboard"
database_id = "32f75b53-2a4a-4070-92f3-c423be4e47e5"
